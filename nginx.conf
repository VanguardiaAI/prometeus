server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # Long cache for hashed assets (Vite emits content-hashed filenames)
  location ~* ^/assets/.*\.(js|css|woff2?|ttf|otf|eot)$ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Image / media caching
  location ~* \.(jpg|jpeg|png|webp|svg|gif|ico|mp4|webm)$ {
    access_log off;
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # Pre-rendered HTML entry points — never cache to always serve latest build
  location = / {
    try_files /index.html =404;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location = /agent.html {
    try_files /agent.html =404;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location = /agent {
    return 301 /agent.html;
  }

  # Default: fall back to index.html for unknown paths, but keep 404 for assets
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Deny hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
